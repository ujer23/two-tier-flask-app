services:
  mysql:
    image: mysql:5.7
    container_name: mysql
    environment:
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: twsdb
    volumes:
      - mysql_data_new:/var/lib/mysql
    networks:
      - twotier

    ports:
      - "3306:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost","-uroot","-padmin"] 
      interval: 5s 
      retries: 5  
      timeout: 3s
      start_period: 60s

  flask-app:
    build:
      context: .
    container_name: flask-app
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_DB: twsdb

    networks:
      - twotier
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy 



networks:
  twotier:

volumes:
  mysql_data_new:  
      

